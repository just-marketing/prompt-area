<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="60" viewBox="0 0 1200 60" fill="none" role="img" aria-label="Prompt Area is on Product Hunt. Come say hi and tell us what to build next. Support us.">
  <rect width="1200" height="60" rx="8" fill="#ff6154"/>
  <style>
    .txt { font-family: ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  </style>
  <!-- Left: message -->
  <text class="txt" x="32" y="30" font-size="20" dominant-baseline="central">🎉</text>
  <text class="txt" x="64" y="30" font-size="16" font-weight="500" fill="#ffffff" dominant-baseline="central">Prompt Area is on Product Hunt. Come say hi and tell us what to build next.</text>
  <!-- Right: Support us pill -->
  <g>
    <rect x="1008" y="13" width="160" height="34" rx="17" fill="#ffffff"/>
    <text class="txt" x="1039" y="31" font-size="15" font-weight="600" fill="#ff6154" dominant-baseline="central">Support us</text>
    <g stroke="#ff6154" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" transform="translate(1123, 30)">
      <line x1="0" y1="0" x2="12" y2="0"/>
      <polyline points="7,-5 12,0 7,5"/>
    </g>
  </g>
</svg>
