name: Release

# Publishes the `prompt-area` npm package when a GitHub Release is published.
# Requires an `NPM_TOKEN` repository secret (an npm automation token with
# publish access). Until that secret exists, this workflow is a no-op.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Build package
        run: pnpm --filter prompt-area build
      - name: Validate exports & types
        run: pnpm --filter prompt-area lint:exports
      - name: Publish
        run: pnpm --filter prompt-area publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
